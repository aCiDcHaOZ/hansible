---
- name: Maak VM op Proxmox vanuit GoldenRecord via API
  hosts: localhost
  gather_facts: false
  collections:
    - community.proxmox
    - community.crypto

  vars:
    local_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"

    proxmox_api_host: "10.24.43.3"
    proxmox_api_port: 8006
    proxmox_secret_file: "{{ local_home }}/secrets/proxmox_secret"

    proxmox_api_user: "{{ lookup('ansible.builtin.ini', 'api_user type=properties file=' + proxmox_secret_file) | trim }}"
    proxmox_api_token_id: "{{ lookup('ansible.builtin.ini', 'api_token_id type=properties file=' + proxmox_secret_file) | trim }}"
    proxmox_api_token_secret: "{{ lookup('ansible.builtin.ini', 'api_token_secret type=properties file=' + proxmox_secret_file) | trim }}"

    proxmox_auth_header: "PVEAPIToken={{ proxmox_api_user }}!{{ proxmox_api_token_id }}={{ proxmox_api_token_secret }}"

    vm_storage: "ceph-pool"

    vm_memory: 2048
    vm_cores: 2
    vm_bridge: "vmbr0"
    vm_gateway: "10.24.43.1"
    vm_cidr: "24"
    vm_nameservers:
      - "1.1.1.1"
      - "8.8.8.8"
    vm_searchdomain: "lan"

    vm_bootstrap_user: "lionel"
    vm_bootstrap_password: "{{ lookup('ansible.builtin.file', local_home + '/secrets/pwd_secret') | trim }}"

  module_defaults:
    group/community.proxmox.proxmox:
      api_host: "{{ proxmox_api_host }}"
      api_port: "{{ proxmox_api_port }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id }}"
      api_token_secret: "{{ proxmox_api_token_secret }}"
      validate_certs: false

  pre_tasks:
    - name: Controleer Proxmox credentials uit secretbestand
      ansible.builtin.assert:
        that:
          - proxmox_api_user | length > 0
          - proxmox_api_token_id | length > 0
          - proxmox_api_token_secret | length > 0
        fail_msg: "Bestand ~/secrets/proxmox_secret mist api_user, api_token_id of api_token_secret"

    - name: Controleer dat klantnummer is opgegeven
      ansible.builtin.assert:
        that:
          - klantnummer is defined
          - klantnummer | string | length > 0
        fail_msg: "Geef een klantnummer op via -e klantnummer=123"

    - name: Controleer dat inventorygroep servers bestaat en hosts bevat
      ansible.builtin.assert:
        that:
          - groups['servers'] is defined
          - groups['servers'] | length > 0
        fail_msg: "De inventorygroep [servers] ontbreekt of bevat geen hosts"

    - name: Kies willekeurige PVE-host
      ansible.builtin.set_fact:
        selected_pve_host: "{{ groups['servers'] | random }}"

    - name: Toon willekeurig gekozen PVE-host
      ansible.builtin.debug:
        msg: "Willekeurig gekozen PVE-host: {{ selected_pve_host }}"

    - name: Controleer dat goldenrecord_vmid aanwezig is voor gekozen host
      ansible.builtin.assert:
        that:
          - hostvars[selected_pve_host].goldenrecord_vmid is defined
          - hostvars[selected_pve_host].goldenrecord_vmid | string | length > 0
        fail_msg: "Definieer goldenrecord_vmid voor elke host in hosts.ini"

    - name: Stel Proxmox node en goldenrecord vast
      ansible.builtin.set_fact:
        proxmox_node: "{{ hostvars[selected_pve_host].proxmox_node | default(selected_pve_host) }}"
        vm_template_vmid: "{{ hostvars[selected_pve_host].goldenrecord_vmid | int }}"

    - name: Vraag een vrij IP-adres op
      ansible.builtin.command: "./ip_manager.sh give"
      args:
        chdir: "{{ playbook_dir }}"
      register: ip_manager_result
      changed_when: false

    - name: Controleer dat ip_manager een IP-adres heeft teruggegeven
      ansible.builtin.assert:
        that:
          - ip_manager_result.stdout is defined
          - ip_manager_result.stdout | trim | length > 0
        fail_msg: "ip_manager.sh give gaf geen IP-adres terug"

    - name: Zorg dat ~/keys bestaat
      ansible.builtin.file:
        path: "{{ local_home }}/keys"
        state: directory
        mode: "0700"

    - name: Zorg dat ~/.ssh bestaat
      ansible.builtin.file:
        path: "{{ local_home }}/.ssh"
        state: directory
        mode: "0700"

    - name: Stel hostname, VMID, gebruikersnaam, keypad en IP vast
      ansible.builtin.set_fact:
        vm_hostname: "vm-{{ klantnummer }}"
        vm_name: "vm-{{ klantnummer }}"
        vm_vmid: "{{ klantnummer | int }}"
        vm_username: "user{{ klantnummer }}"
        vm_ssh_key_path: "{{ local_home }}/keys/id_ed25519_{{ klantnummer }}"
        vm_ip_address: "{{ ip_manager_result.stdout | trim }}"

  tasks:
    - block:
        - name: Controleer dat doel-VMID nog niet bestaat
          community.proxmox.proxmox_vm_info:
            type: qemu
            vmid: "{{ vm_vmid }}"
          register: existing_vm_info

        - name: Faal als VMID al bestaat
          ansible.builtin.assert:
            that:
              - (existing_vm_info.proxmox_vms | default([]) | length) == 0
            fail_msg: "VMID {{ vm_vmid }} bestaat al in het cluster"

        - name: Genereer SSH keypair voor de klantgebruiker
          community.crypto.openssh_keypair:
            path: "{{ vm_ssh_key_path }}"
            type: ed25519
            comment: "{{ vm_username }}@{{ vm_hostname }}"
            mode: "0600"
          register: vm_ssh_keypair

        - name: Bewaar publieke SSH key
          ansible.builtin.set_fact:
            vm_ssh_public_key: "{{ vm_ssh_keypair.public_key }}"

        - name: Clone de VM vanuit GoldenRecord uitsluitend op bron-VMID
          ansible.builtin.uri:
            url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port }}/api2/json/nodes/{{ proxmox_node }}/qemu/{{ vm_template_vmid }}/clone"
            method: POST
            headers:
              Authorization: "{{ proxmox_auth_header }}"
            body_format: form-urlencoded
            body:
              newid: "{{ vm_vmid }}"
              name: "{{ vm_name }}"
              full: "1"
              storage: "{{ vm_storage }}"
            validate_certs: false
            status_code: 200
          register: clone_result
          no_log: true

        - name: Wacht kort op de clone-taak
          ansible.builtin.pause:
            seconds: 8

        - name: Wacht tot de nieuwe VM zichtbaar is
          community.proxmox.proxmox_vm_info:
            type: qemu
            vmid: "{{ vm_vmid }}"
          register: created_vm_info
          retries: 20
          delay: 3
          until: (created_vm_info.proxmox_vms | default([]) | length) > 0

        - name: Configureer de VM en cloud-init
          community.proxmox.proxmox_kvm:
            node: "{{ proxmox_node }}"
            vmid: "{{ vm_vmid }}"
            name: "{{ vm_name }}"
            update: true
            update_unsafe: true
            cores: "{{ vm_cores }}"
            memory: "{{ vm_memory }}"
            onboot: true
            agent: "enabled=1"
            net:
              net0: "virtio,bridge={{ vm_bridge }},firewall=1"
            ipconfig:
              ipconfig0: "ip={{ vm_ip_address }}/{{ vm_cidr }},gw={{ vm_gateway }}"
            ciuser: "{{ vm_bootstrap_user }}"
            cipassword: "{{ vm_bootstrap_password }}"
            sshkeys: "{{ vm_ssh_public_key }}"
            nameservers: "{{ vm_nameservers }}"
            searchdomains: "{{ vm_searchdomain }}"
          no_log: true

        - name: Start de VM
          community.proxmox.proxmox_kvm:
            node: "{{ proxmox_node }}"
            vmid: "{{ vm_vmid }}"
            state: started
            timeout: 300
          no_log: true

        - name: Wacht kort zodat de VM initieel kan opstarten
          ansible.builtin.pause:
            seconds: 20

        - name: Enable firewall op VM via Proxmox API
          ansible.builtin.uri:
            url: "https://{{ proxmox_api_host }}:{{ proxmox_api_port }}/api2/json/nodes/{{ proxmox_node }}/qemu/{{ vm_vmid }}/firewall/options"
            method: PUT
            headers:
              Authorization: "{{ proxmox_auth_header }}"
            body_format: form-urlencoded
            body:
              enable: "1"
            validate_certs: false
            status_code: 200
          no_log: true

        - name: Voeg firewallregels toe aan de VM
          community.proxmox.proxmox_firewall:
            node: "{{ proxmox_node }}"
            level: vm
            vmid: "{{ vm_vmid }}"
            state: present
            rules:
              - pos: 0
                type: in
                action: ACCEPT
                proto: tcp
                dport: "22"
                iface: net0
                enable: true
                comment: "Allow SSH"
              - pos: 1
                type: in
                action: ACCEPT
                proto: tcp
                dport: "80"
                iface: net0
                enable: true
                comment: "Allow HTTP"
              - pos: 2
                type: in
                action: ACCEPT
                proto: tcp
                dport: "443"
                iface: net0
                enable: true
                comment: "Allow HTTPS"
              - pos: 3
                type: in
                action: DROP
                iface: net0
                enable: true
                comment: "Drop all other ingress"
          no_log: true

        - name: Voeg VM toe aan Proxmox HA
          community.proxmox.proxmox_cluster_ha_resources:
            name: "vm:{{ vm_vmid }}"
            state: present
          no_log: true

        - name: Wacht tot SSH op de VM bereikbaar is
          ansible.builtin.wait_for:
            host: "{{ vm_ip_address }}"
            port: 22
            delay: 5
            timeout: 300
            state: started

        - name: Wacht kort zodat cloud-init volledig is toegepast
          ansible.builtin.pause:
            seconds: 15

        - name: Verwijder oude SSH host key voor de VM uit known_hosts
          ansible.builtin.command: >
            ssh-keygen -f {{ local_home }}/.ssh/known_hosts -R {{ vm_ip_address }}
          failed_when: false
          changed_when: true

        - name: Voeg actuele SSH host key van de VM toe aan known_hosts
          ansible.builtin.shell: >
            ssh-keyscan -H {{ vm_ip_address }} >> {{ local_home }}/.ssh/known_hosts
          args:
            executable: /bin/bash
          changed_when: true

        - name: Maak unieke gebruiker aan met sudo rechten
          ansible.builtin.shell: |
            sshpass -p '{{ vm_bootstrap_password }}' ssh \
              -o StrictHostKeyChecking=yes \
              {{ vm_bootstrap_user }}@{{ vm_ip_address }} '
            sudo bash -lc "
            id -u {{ vm_username }} >/dev/null 2>&1 || useradd -m -s /bin/bash {{ vm_username }}
            usermod -aG sudo {{ vm_username }}
            echo \"{{ vm_username }} ALL=(ALL) NOPASSWD:ALL\" > /etc/sudoers.d/{{ vm_username }}
            chmod 440 /etc/sudoers.d/{{ vm_username }}
            mkdir -p /home/{{ vm_username }}/.ssh
            chmod 700 /home/{{ vm_username }}/.ssh
            cat > /home/{{ vm_username }}/.ssh/authorized_keys <<\"EOF\"
            {{ vm_ssh_public_key }}
            EOF
            chmod 600 /home/{{ vm_username }}/.ssh/authorized_keys
            chown -R {{ vm_username }}:{{ vm_username }} /home/{{ vm_username }}/.ssh
            "'
          args:
            executable: /bin/bash
          no_log: true

      rescue:
        - name: Verwijder HA-resource als die al is aangemaakt
          community.proxmox.proxmox_cluster_ha_resources:
            name: "vm:{{ vm_vmid }}"
            state: absent
          failed_when: false
          no_log: true

        - name: Stop de VM geforceerd als die bestaat
          community.proxmox.proxmox_kvm:
            node: "{{ proxmox_node }}"
            vmid: "{{ vm_vmid }}"
            state: stopped
            force: true
            timeout: 300
          failed_when: false
          no_log: true

        - name: Wacht tot VM echt gestopt is
          community.proxmox.proxmox_vm_info:
            type: qemu
            vmid: "{{ vm_vmid }}"
          register: vm_stop_check
          retries: 20
          delay: 5
          until: >
            (vm_stop_check.proxmox_vms | default([]) | length) == 0
            or
            ((vm_stop_check.proxmox_vms | first).status | default('stopped')) == 'stopped'
          failed_when: false
          no_log: true

        - name: Verwijder half aangemaakte VM
          community.proxmox.proxmox_kvm:
            node: "{{ proxmox_node }}"
            vmid: "{{ vm_vmid }}"
            state: absent
            purge: true
            timeout: 300
          failed_when: false
          no_log: true

        - name: Geef Proxmox nog even tijd voor cleanup
          ansible.builtin.pause:
            seconds: 10

        - name: Geef IP-adres terug aan pool
          ansible.builtin.command: "./ip_manager.sh remove {{ vm_ip_address }}"
          args:
            chdir: "{{ playbook_dir }}"
          when: vm_ip_address is defined
          failed_when: false

        - name: Verwijder lokale private key bij failure
          ansible.builtin.file:
            path: "{{ vm_ssh_key_path }}"
            state: absent
          failed_when: false

        - name: Verwijder lokale public key bij failure
          ansible.builtin.file:
            path: "{{ vm_ssh_key_path }}.pub"
            state: absent
          failed_when: false

        - name: Stop playbook omdat provisioning faalde
          ansible.builtin.fail:
            msg: >-
              Provisioning van VM {{ vm_hostname }} op node {{ proxmox_node }} mislukt.
              VM is verwijderd of cleanup is geprobeerd, IP {{ vm_ip_address }} is teruggegeven en lokale keys zijn opgeruimd.

  post_tasks:
    - name: Toon gekozen PVE-host
      ansible.builtin.debug:
        msg: "VM wordt aangemaakt op node {{ proxmox_node }} via API host {{ proxmox_api_host }}"

    - name: Toon gebruikte GoldenRecord VMID
      ansible.builtin.debug:
        msg: "GoldenRecord VMID op node {{ proxmox_node }} is {{ vm_template_vmid }}"

    - name: Toon bootstrap user
      ansible.builtin.debug:
        msg: "Bootstrap user voor eerste login is {{ vm_bootstrap_user }}"

    - name: Toon aangemaakte eindgebruiker
      ansible.builtin.debug:
        msg: "Aangemaakte Linux gebruiker met sudo rechten: {{ vm_username }}"

    - name: Toon toegewezen IP-adres
      ansible.builtin.debug:
        msg: "VM {{ vm_hostname }} heeft IP-adres {{ vm_ip_address }}/{{ vm_cidr }} met gateway {{ vm_gateway }}"

    - name: Toon locatie van private key
      ansible.builtin.debug:
        msg: "{{ vm_ssh_key_path }}"

    - name: Toon locatie van public key
      ansible.builtin.debug:
        msg: "{{ vm_ssh_key_path }}.pub"

    - name: Toon de publieke SSH key
      ansible.builtin.debug:
        msg: "{{ vm_ssh_public_key }}"
