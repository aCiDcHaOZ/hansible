---
- name: Verwijder VM op Proxmox
  hosts: localhost
  gather_facts: false
  collections:
    - community.proxmox

  vars:
    proxmox_api_port: 8006
    proxmox_api_user: "root@pam"
    proxmox_api_password: "{{ lookup('ansible.builtin.file', 'pwd_secret') | trim }}"
    local_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"

  pre_tasks:
    - name: Controleer dat klantnummer is opgegeven
      ansible.builtin.assert:
        that:
          - klantnummer is defined
          - klantnummer | string | length > 0
        fail_msg: "Geef een klantnummer op via -e klantnummer=123"

    - name: Controleer dat inventorygroep servers bestaat en hosts bevat
      ansible.builtin.assert:
        that:
          - groups['servers'] is defined
          - groups['servers'] | length > 0
        fail_msg: "Inventorygroep 'servers' ontbreekt of bevat geen hosts."

    - name: Stel hostname, VMID en keypaden vast
      ansible.builtin.set_fact:
        vm_hostname: "vm-{{ klantnummer }}"
        vm_vmid: "{{ klantnummer | int }}"
        vm_ssh_key_path: "{{ local_home }}/keys/id_ed25519_{{ klantnummer }}"

    - name: Zoek op welke Proxmox-node de VM staat
      ansible.builtin.shell: >
        ssh -o StrictHostKeyChecking=no root@{{ hostvars[item].ansible_host }}
        "qm config {{ vm_vmid }}"
      args:
        executable: /bin/bash
      loop: "{{ groups['servers'] }}"
      register: vm_lookup_results
      changed_when: false
      failed_when: false

    - name: Bepaal lookup-resultaat van de juiste node
      ansible.builtin.set_fact:
        vm_found_result: >-
          {{
            (
              vm_lookup_results.results
              | selectattr('rc', 'equalto', 0)
              | list
              | first
            ) | default({})
          }}

    - name: Bepaal of de VM bestaat
      ansible.builtin.set_fact:
        vm_exists: "{{ vm_found_result != {} }}"

    - name: Stel Proxmox hostgegevens vast van gevonden VM
      ansible.builtin.set_fact:
        selected_pve_host: "{{ vm_found_result.item }}"
        proxmox_api_host: "{{ hostvars[vm_found_result.item].ansible_host }}"
        proxmox_node: "{{ hostvars[vm_found_result.item].proxmox_node | default(vm_found_result.item) }}"
        vm_config_stdout_lines: "{{ vm_found_result.stdout_lines | default([]) }}"
      when: vm_exists

    - name: Haal ipconfig0-config uit VM-config
      ansible.builtin.set_fact:
        vm_ipconfig0_line: >-
          {{
            (
              vm_config_stdout_lines
              | select('match', '^ipconfig0:')
              | list
              | first
              | default('')
            )
          }}
      when: vm_exists

    - name: Haal IP-adres uit ipconfig0-config
      ansible.builtin.set_fact:
        vm_ip_address: "{{ vm_ipconfig0_line | regex_search('ip=([0-9.]+)/(\\d+)', '\\1') | first }}"
      when:
        - vm_exists
        - vm_ipconfig0_line | length > 0
        - vm_ipconfig0_line is search('ip=[0-9.]+/[0-9]+')

  tasks:
    - block:
        - name: Stop de VM
          community.proxmox.proxmox_kvm:
            api_host: "{{ proxmox_api_host }}"
            api_port: "{{ proxmox_api_port }}"
            api_user: "{{ proxmox_api_user }}"
            api_password: "{{ proxmox_api_password }}"
            validate_certs: false
            node: "{{ proxmox_node }}"
            vmid: "{{ vm_vmid }}"
            state: stopped
          when: vm_exists
          ignore_errors: true
          no_log: true

        - name: Verwijder de VM
          community.proxmox.proxmox_kvm:
            api_host: "{{ proxmox_api_host }}"
            api_port: "{{ proxmox_api_port }}"
            api_user: "{{ proxmox_api_user }}"
            api_password: "{{ proxmox_api_password }}"
            validate_certs: false
            node: "{{ proxmox_node }}"
            vmid: "{{ vm_vmid }}"
            state: absent
          when: vm_exists
          no_log: true

        - name: Verwijder lokale private key
          ansible.builtin.file:
            path: "{{ vm_ssh_key_path }}"
            state: absent

        - name: Verwijder lokale public key
          ansible.builtin.file:
            path: "{{ vm_ssh_key_path }}.pub"
            state: absent

        - name: Geef IP-adres terug aan ip_manager
          ansible.builtin.command: "./ip_manager.sh remove {{ vm_ip_address }}"
          args:
            chdir: "{{ playbook_dir }}"
          when: vm_ip_address is defined
          register: ip_remove_result
          changed_when: ip_remove_result.rc == 0

      rescue:
        - name: Meld teardown failure
          ansible.builtin.fail:
            msg: >-
              Verwijderen van VM {{ vm_hostname }} is mislukt.
              Controleer handmatig of de VM, keys en het IP-adres zijn opgeruimd.

    - name: Toon gevonden node
      ansible.builtin.debug:
        msg: >-
          {% if vm_exists %}
          VM {{ vm_hostname }} (VMID {{ vm_vmid }}) stond op host {{ selected_pve_host }}
          met node {{ proxmox_node }} en is verwijderd.
          {% else %}
          VM {{ vm_hostname }} (VMID {{ vm_vmid }}) bestond niet meer.
          {% endif %}

    - name: Toon resultaat keys
      ansible.builtin.debug:
        msg: "Lokale keys verwijderd: {{ vm_ssh_key_path }} en {{ vm_ssh_key_path }}.pub"

    - name: Toon resultaat IP-release
      ansible.builtin.debug:
        msg: >-
          {% if vm_ip_address is defined %}
          IP-adres {{ vm_ip_address }} is teruggegeven aan ip_manager.
          {% else %}
          Er is geen IP-adres uit de VM-config gehaald, dus er is niets teruggegeven aan ip_manager.
          {% endif %}
