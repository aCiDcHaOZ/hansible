---
- name: Maak WordPress CT op Proxmox
  hosts: localhost
  gather_facts: false
  collections:
    - community.proxmox
    - community.crypto

  vars:
    proxmox_api_port: 8006
    proxmox_api_user: "root@pam"
    proxmox_api_password: "{{ lookup('ansible.builtin.file', 'pwd_secret') | trim }}"

    ct_template: "local:vztmpl/debian-12-turnkey-wordpress_18.2-1_amd64.tar.gz"

    ct_memory: 512
    ct_cores: 1
    ct_disk: "local-lvm:10"
    ct_bridge: "vmbr0"
    ct_gateway: "10.24.43.1"
    ct_cidr: "24"

    netdata_parent_ip: "10.24.43.6"
    netdata_parent_port: "19999"
    netdata_stream_api_key: "{{ lookup('ansible.builtin.file', 'netdata_secret') | trim }}"

    netdata_initial_wait_seconds: 5
    netdata_status_retries: 10
    netdata_status_delay_seconds: 2

    local_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"

  pre_tasks:
    - name: Controleer dat klantnummer is opgegeven
      ansible.builtin.assert:
        that:
          - klantnummer is defined
          - klantnummer | string | length > 0
        fail_msg: "Geef een klantnummer op via -e klantnummer=123"

    - name: Controleer dat inventorygroep servers bestaat en hosts bevat
      ansible.builtin.assert:
        that:
          - groups['servers'] is defined
          - groups['servers'] | length > 0
        fail_msg: "De inventorygroep [servers] ontbreekt of bevat geen hosts"

    - name: Controleer dat Netdata API key aanwezig is
      ansible.builtin.assert:
        that:
          - netdata_stream_api_key is defined
          - netdata_stream_api_key | length > 0
        fail_msg: "Bestand netdata_secret ontbreekt of bevat geen geldige Netdata API key"

    - name: Kies willekeurige PVE-host
      ansible.builtin.set_fact:
        selected_pve_host: "{{ groups['servers'] | random }}"

    - name: Stel Proxmox hostgegevens vast
      ansible.builtin.set_fact:
        proxmox_node: "{{ selected_pve_host }}"
        proxmox_api_host: "{{ hostvars[selected_pve_host].ansible_host | default(selected_pve_host) }}"

    - name: Vraag een vrij IP-adres op
      ansible.builtin.command: "./ip_manager.sh give"
      args:
        chdir: "{{ playbook_dir }}"
      register: ip_manager_result
      changed_when: false

    - name: Controleer dat ip_manager een IP-adres heeft teruggegeven
      ansible.builtin.assert:
        that:
          - ip_manager_result.stdout is defined
          - ip_manager_result.stdout | trim | length > 0
        fail_msg: "ip_manager.sh give gaf geen IP-adres terug"

    - name: Zorg dat ~/keys bestaat
      ansible.builtin.file:
        path: "{{ local_home }}/keys"
        state: directory
        mode: "0700"

    - name: Stel hostname, VMID, gebruikersnaam en IP vast
      ansible.builtin.set_fact:
        ct_hostname: "wordpress-{{ klantnummer }}"
        ct_vmid: "{{ klantnummer | int }}"
        ct_username: "{{ klantnummer }}"
        ct_ssh_key_path: "{{ local_home }}/keys/id_ed25519_{{ klantnummer }}"
        ct_ip_address: "{{ ip_manager_result.stdout | trim }}"

    - name: Genereer SSH keypair voor de klantgebruiker
      community.crypto.openssh_keypair:
        path: "{{ ct_ssh_key_path }}"
        type: ed25519
        comment: "{{ ct_username }}@{{ ct_hostname }}"
        mode: "0600"
      register: ct_ssh_keypair

    - name: Bewaar publieke SSH key
      ansible.builtin.set_fact:
        ct_ssh_public_key: "{{ ct_ssh_keypair.public_key }}"

  tasks:
    - block:

        - name: Maak de CT aan
          community.proxmox.proxmox:
            api_host: "{{ proxmox_api_host }}"
            api_port: "{{ proxmox_api_port }}"
            api_user: "{{ proxmox_api_user }}"
            api_password: "{{ proxmox_api_password }}"
            validate_certs: false
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            state: present
            hostname: "{{ ct_hostname }}"
            ostemplate: "{{ ct_template }}"
            password: "{{ proxmox_api_password }}"
            cores: "{{ ct_cores }}"
            memory: "{{ ct_memory }}"
            disk: "{{ ct_disk }}"
            netif:
              net0: "name=eth0,bridge={{ ct_bridge }},ip={{ ct_ip_address }}/{{ ct_cidr }},gw={{ ct_gateway }},firewall=1,rate=50"
            onboot: true
            unprivileged: true

        - name: Voeg firewallregels toe aan de CT
          community.proxmox.proxmox_firewall:
            api_host: "{{ proxmox_api_host }}"
            api_port: "{{ proxmox_api_port }}"
            api_user: "{{ proxmox_api_user }}"
            api_password: "{{ proxmox_api_password }}"
            validate_certs: false
            node: "{{ proxmox_node }}"
            level: vm
            vmid: "{{ ct_vmid }}"
            state: present
            rules:
              - pos: 0
                type: in
                action: ACCEPT
                proto: tcp
                dport: "22"
                iface: net0
                enable: true
              - pos: 1
                type: in
                action: ACCEPT
                proto: tcp
                dport: "80"
                iface: net0
                enable: true
              - pos: 2
                type: in
                action: ACCEPT
                proto: tcp
                dport: "443"
                iface: net0
                enable: true
              - pos: 3
                type: in
                action: DROP
                iface: net0
                enable: true

        - name: Start de CT
          community.proxmox.proxmox:
            api_host: "{{ proxmox_api_host }}"
            api_port: "{{ proxmox_api_port }}"
            api_user: "{{ proxmox_api_user }}"
            api_password: "{{ proxmox_api_password }}"
            validate_certs: false
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            state: started

        - name: Wacht tot CT is opgestart
          ansible.builtin.pause:
            seconds: 8

        - name: Maak gebruiker aan in de CT
          ansible.builtin.shell: >
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }}
            "pct exec {{ ct_vmid }} -- sh -c 'id -u {{ ct_username }} >/dev/null 2>&1 || useradd -m -s /bin/bash {{ ct_username }}'"

        - name: Installeer Netdata
          ansible.builtin.shell: |
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }} \
            "pct exec {{ ct_vmid }} -- sh -c '
            export DEBIAN_FRONTEND=noninteractive
            if ! command -v netdata >/dev/null 2>&1; then
              apt-get update
              apt-get install -y curl ca-certificates
              curl -fsSL https://get.netdata.cloud/kickstart.sh -o /tmp/netdata-kickstart.sh
              sh /tmp/netdata-kickstart.sh --non-interactive
            fi'"

        - name: Configureer Netdata streaming
          ansible.builtin.shell: |
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }} \
            "pct exec {{ ct_vmid }} -- sh -c 'cat > /etc/netdata/stream.conf <<\"EOF\"
            [stream]
                enabled = yes
                destination = {{ netdata_parent_ip }}:{{ netdata_parent_port }}
                api key = {{ netdata_stream_api_key }}
                timeout seconds = 60
                send charts matching = *
                buffer size bytes = 1048576
                reconnect delay seconds = 5
                initial clock resync iterations = 60
            EOF'"

        - name: Maak systemd override voor Netdata (LXC)
          ansible.builtin.shell: |
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }} \
            "pct exec {{ ct_vmid }} -- sh -c 'mkdir -p /etc/systemd/system/netdata.service.d &&
            cat > /etc/systemd/system/netdata.service.d/lxc.conf <<\"EOF\"
            [Service]
            PrivateTmp=no
            PrivateDevices=no
            ProtectSystem=off
            ProtectHome=no
            ProtectControlGroups=no
            ProtectKernelModules=no
            ProtectKernelTunables=no
            PrivateUsers=no
            RestrictNamespaces=no
            ProtectProc=default
            ProcSubset=all
            EOF'"

        - name: Herstart Netdata
          ansible.builtin.shell: >
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }}
            "pct exec {{ ct_vmid }} -- systemctl daemon-reload &&
             pct exec {{ ct_vmid }} -- systemctl enable netdata &&
             pct exec {{ ct_vmid }} -- systemctl restart netdata"

        - name: Wacht tot Netdata actief is
          ansible.builtin.shell: >
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }}
            "pct exec {{ ct_vmid }} -- systemctl is-active netdata || true"
          register: netdata_status
          retries: "{{ netdata_status_retries }}"
          delay: "{{ netdata_status_delay_seconds }}"
          until: netdata_status.stdout | trim == "active"
          changed_when: false

      rescue:
        - name: Stop de CT
          community.proxmox.proxmox:
            api_host: "{{ proxmox_api_host }}"
            api_port: "{{ proxmox_api_port }}"
            api_user: "{{ proxmox_api_user }}"
            api_password: "{{ proxmox_api_password }}"
            validate_certs: false
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            state: stopped
          ignore_errors: true

        - name: Verwijder CT
          community.proxmox.proxmox:
            api_host: "{{ proxmox_api_host }}"
            api_port: "{{ proxmox_api_port }}"
            api_user: "{{ proxmox_api_user }}"
            api_password: "{{ proxmox_api_password }}"
            validate_certs: false
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            state: absent
          ignore_errors: true

        - name: Geef IP terug aan pool
          ansible.builtin.command: "./ip_manager.sh remove {{ ct_ip_address }}"
          args:
            chdir: "{{ playbook_dir }}"
          ignore_errors: true

        - name: Stop playbook
          ansible.builtin.fail:
            msg: "Provisioning van CT {{ ct_hostname }} is mislukt."

    - name: Toon resultaat
      ansible.builtin.debug:
        msg: |
          CT {{ ct_hostname }} succesvol aangemaakt
          Node: {{ proxmox_node }}
          IP: {{ ct_ip_address }}
          Netdata parent: {{ netdata_parent_ip }}
