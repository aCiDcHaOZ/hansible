---
- name: Maak WordPress CT op Proxmox
  hosts: localhost
  gather_facts: false
  collections:
    - community.proxmox
    - community.crypto
    - ansible.posix

  vars:
    local_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"

    proxmox_api_host: "10.24.43.3"
    proxmox_api_port: 8006
    proxmox_secret_file: "{{ local_home }}/secrets/proxmox_secret"

    proxmox_api_user: "{{ lookup('ansible.builtin.ini', 'api_user type=properties file=' + proxmox_secret_file) | trim }}"
    proxmox_api_token_id: "{{ lookup('ansible.builtin.ini', 'api_token_id type=properties file=' + proxmox_secret_file) | trim }}"
    proxmox_api_token_secret: "{{ lookup('ansible.builtin.ini', 'api_token_secret type=properties file=' + proxmox_secret_file) | trim }}"

    proxmox_node: "roos"
    ct_source_template_vmid: 200
    ct_clone_type: "linked"

    ct_memory: 512
    ct_cores: 1
    ct_bridge: "vmbr0"
    ct_gateway: "10.24.43.1"
    ct_cidr: "24"

    netdata_parent_ip: "10.24.43.6"
    netdata_parent_port: "19999"
    netdata_stream_api_key: "{{ lookup('ansible.builtin.file', local_home + '/secrets/netdata_secret') | trim }}"

  module_defaults:
    group/community.proxmox.proxmox:
      api_host: "{{ proxmox_api_host }}"
      api_port: "{{ proxmox_api_port }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id }}"
      api_token_secret: "{{ proxmox_api_token_secret }}"
      validate_certs: false

  pre_tasks:
    - name: Controleer Proxmox credentials uit secretbestand
      ansible.builtin.assert:
        that:
          - proxmox_api_user | length > 0
          - proxmox_api_token_id | length > 0
          - proxmox_api_token_secret | length > 0
        fail_msg: "Bestand ~/secrets/proxmox_secret mist api_user, api_token_id of api_token_secret"

    - name: Controleer dat klantnummer is opgegeven
      ansible.builtin.assert:
        that:
          - klantnummer is defined
          - klantnummer | string | length > 0
        fail_msg: "Geef een klantnummer op via -e klantnummer=123"

    - name: Controleer dat inventorygroep servers bestaat en hosts bevat
      ansible.builtin.assert:
        that:
          - groups['servers'] is defined
          - groups['servers'] | length > 0
        fail_msg: "De inventorygroep [servers] ontbreekt of bevat geen hosts"

    - name: Controleer dat node roos in inventorygroep servers bestaat
      ansible.builtin.assert:
        that:
          - proxmox_node in groups['servers']
        fail_msg: "Node {{ proxmox_node }} staat niet in inventorygroep [servers]"

    - name: Stel Proxmox hostgegevens vast voor node roos
      ansible.builtin.set_fact:
        proxmox_api_host: "{{ hostvars[proxmox_node].ansible_host | default(proxmox_node) }}"

    - name: Controleer dat Netdata API key aanwezig is
      ansible.builtin.assert:
        that:
          - netdata_stream_api_key is defined
          - netdata_stream_api_key | length > 0
        fail_msg: "Bestand ~/secrets/netdata_secret ontbreekt of bevat geen geldige Netdata API key"

    - name: Controleer dat bron-template CT 200 bestaat op roos
      community.proxmox.proxmox_vm_info:
        node: "{{ proxmox_node }}"
        vmid: "{{ ct_source_template_vmid }}"
        type: lxc
      register: source_ct_info

    - name: Controleer dat bron-template CT 200 gevonden is
      ansible.builtin.assert:
        that:
          - source_ct_info.proxmox_vms is defined
          - source_ct_info.proxmox_vms | length > 0
        fail_msg: "Bron-template CT {{ ct_source_template_vmid }} is niet gevonden op node {{ proxmox_node }}"

    - name: Vraag een vrij IP-adres op
      ansible.builtin.command: "./ip_manager.sh give"
      args:
        chdir: "{{ playbook_dir }}"
      register: ip_manager_result
      changed_when: false

    - name: Controleer dat ip_manager een IP-adres heeft teruggegeven
      ansible.builtin.assert:
        that:
          - ip_manager_result.stdout is defined
          - ip_manager_result.stdout | trim | length > 0
        fail_msg: "ip_manager.sh give gaf geen IP-adres terug"

    - name: Zorg dat ~/keys bestaat
      ansible.builtin.file:
        path: "{{ local_home }}/keys"
        state: directory
        mode: "0700"

    - name: Stel hostname, VMID, gebruiker, IP en keypad vast
      ansible.builtin.set_fact:
        ct_hostname: "wordpress-{{ klantnummer }}"
        ct_vmid: "{{ klantnummer | int }}"
        ct_username: "user{{ klantnummer }}"
        ct_ip_address: "{{ ip_manager_result.stdout | trim }}"
        ct_ssh_key_path: "{{ local_home }}/keys/id_ed25519_{{ klantnummer }}"

    - name: Genereer SSH keypair voor deze CT
      community.crypto.openssh_keypair:
        path: "{{ ct_ssh_key_path }}"
        type: ed25519
        comment: "{{ ct_username }}@{{ ct_hostname }}"
        mode: "0600"
      register: ct_ssh_keypair

    - name: Bewaar bootstrap en klant public key
      ansible.builtin.set_fact:
        bootstrap_ssh_private_key: "{{ ct_ssh_key_path }}"
        bootstrap_ssh_public_key: "{{ ct_ssh_keypair.public_key }}"
        ct_ssh_public_key: "{{ ct_ssh_keypair.public_key }}"

  tasks:
    - name: Maak CT aan en bootstrap root SSH
      block:
        - name: Clone CT vanaf selfmade template CTID 200 op roos
          community.proxmox.proxmox:
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            state: present
            clone: "{{ ct_source_template_vmid }}"
            clone_type: "{{ ct_clone_type }}"
            hostname: "{{ ct_hostname }}"

        - name: Pas CT-configuratie aan na clone
          community.proxmox.proxmox:
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            update: true
            hostname: "{{ ct_hostname }}"
            cores: "{{ ct_cores }}"
            memory: "{{ ct_memory }}"
            netif:
              net0: "name=eth0,bridge={{ ct_bridge }},ip={{ ct_ip_address }}/{{ ct_cidr }},gw={{ ct_gateway }},firewall=1,rate=50"
            onboot: true

        - name: Voeg firewallregels toe aan de CT
          community.proxmox.proxmox_firewall:
            node: "{{ proxmox_node }}"
            level: vm
            vmid: "{{ ct_vmid }}"
            state: present
            rules:
              - pos: 0
                type: in
                action: ACCEPT
                proto: tcp
                dport: "22"
                iface: net0
                enable: true
                comment: "Allow SSH"
              - pos: 1
                type: in
                action: ACCEPT
                proto: tcp
                dport: "80"
                iface: net0
                enable: true
                comment: "Allow HTTP"
              - pos: 2
                type: in
                action: ACCEPT
                proto: tcp
                dport: "443"
                iface: net0
                enable: true
                comment: "Allow HTTPS"
              - pos: 3
                type: in
                action: DROP
                iface: net0
                enable: true
                comment: "Drop all other ingress"

        - name: Start de CT via pct op de Proxmox node
          ansible.builtin.shell: |
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }} "pct start {{ ct_vmid }}"
          args:
            executable: /bin/bash

        - name: Wacht kort zodat de CT volledig is opgestart
          ansible.builtin.pause:
            seconds: 8

        - name: Bootstrap root authorized_keys in de CT
          ansible.builtin.shell: |
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }} \
            "pct exec {{ ct_vmid }} -- sh -c 'mkdir -p /root/.ssh &&
            chmod 700 /root/.ssh &&
            cat > /root/.ssh/authorized_keys <<\"EOF\"
            {{ bootstrap_ssh_public_key }}
            EOF
            chmod 600 /root/.ssh/authorized_keys'"
          args:
            executable: /bin/bash
          no_log: true

      rescue:
        - name: Stop de CT als die bestaat via pct op de Proxmox node
          ansible.builtin.shell: |
            ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }} \
            "pct shutdown {{ ct_vmid }} --timeout 20 || pct stop {{ ct_vmid }}"
          args:
            executable: /bin/bash
          ignore_errors: true

        - name: Verwijder half aangemaakte CT
          community.proxmox.proxmox:
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            state: absent
          ignore_errors: true

        - name: Geef IP-adres terug aan pool
          ansible.builtin.command: "./ip_manager.sh remove {{ ct_ip_address }}"
          args:
            chdir: "{{ playbook_dir }}"
          when: ct_ip_address is defined
          ignore_errors: true

        - name: Verwijder lokale private key bij failure
          ansible.builtin.file:
            path: "{{ ct_ssh_key_path }}"
            state: absent
          ignore_errors: true

        - name: Verwijder lokale public key bij failure
          ansible.builtin.file:
            path: "{{ ct_ssh_key_path }}.pub"
            state: absent
          ignore_errors: true

        - name: Stop playbook omdat provisioning faalde
          ansible.builtin.fail:
            msg: "Provisioning van CT {{ ct_hostname }} op node {{ proxmox_node }} mislukt. CT is verwijderd, IP {{ ct_ip_address }} is teruggegeven en lokale keys zijn opgeruimd."

    - name: Voeg nieuwe CT toe aan tijdelijke inventory
      ansible.builtin.add_host:
        name: "{{ ct_hostname }}"
        groups: new_wordpress_ct
        ansible_host: "{{ ct_ip_address }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ bootstrap_ssh_private_key }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

    - name: Wacht tot SSH op de CT beschikbaar is
      ansible.builtin.wait_for:
        host: "{{ ct_ip_address }}"
        port: 22
        timeout: 120
        sleep: 3
        delay: 2

- name: Configureer de nieuwe WordPress CT direct via SSH
  hosts: new_wordpress_ct
  gather_facts: false
  become: true
  collections:
    - ansible.posix

  vars:
    proxmox_node: "roos"
    ct_source_template_vmid: 200
    netdata_parent_ip: "10.24.43.6"
    netdata_parent_port: "19999"
    local_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"
    netdata_stream_api_key: "{{ lookup('ansible.builtin.file', local_home + '/secrets/netdata_secret') | trim }}"
    ct_gateway: "10.24.43.1"
    ct_cidr: "24"
    ct_username: "user{{ klantnummer }}"
    ct_ssh_key_path: "{{ local_home }}/keys/id_ed25519_{{ klantnummer }}"
    ct_ssh_public_key: "{{ lookup('ansible.builtin.file', ct_ssh_key_path + '.pub') | trim }}"

  tasks:
    - name: Wacht tot Python beschikbaar is in de CT
      ansible.builtin.raw: test -e /usr/bin/python3 || (apt-get update && apt-get install -y python3)
      changed_when: false

    - name: Verzamel facts opnieuw na Python bootstrap
      ansible.builtin.setup:

    - name: Zorg dat klantgebruiker bestaat
      ansible.builtin.user:
        name: "{{ ct_username }}"
        shell: /bin/bash
        create_home: true
        state: present

    - name: Plaats klant public key in authorized_keys
      ansible.posix.authorized_key:
        user: "{{ ct_username }}"
        state: present
        key: "{{ ct_ssh_public_key }}"

    - name: Installeer basispackages voor Netdata
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
        state: present
        update_cache: true

    - name: Controleer of Netdata al is geïnstalleerd
      ansible.builtin.command: command -v netdata
      register: netdata_binary_check
      changed_when: false
      failed_when: false

    - name: Download Netdata installer
      ansible.builtin.get_url:
        url: "https://get.netdata.cloud/kickstart.sh"
        dest: /tmp/netdata-kickstart.sh
        mode: "0755"
      when: netdata_binary_check.rc != 0

    - name: Installeer Netdata
      ansible.builtin.command: sh /tmp/netdata-kickstart.sh --non-interactive
      when: netdata_binary_check.rc != 0
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Schrijf Netdata stream.conf
      ansible.builtin.copy:
        dest: /etc/netdata/stream.conf
        mode: "0644"
        content: |
          [stream]
              enabled = yes
              destination = {{ netdata_parent_ip }}:{{ netdata_parent_port }}
              api key = {{ netdata_stream_api_key }}
              timeout seconds = 60
              default port = {{ netdata_parent_port }}
              send charts matching = *
              buffer size bytes = 1048576
              reconnect delay seconds = 5
              initial clock resync iterations = 60
      no_log: true

    - name: Verwijder legacy child.conf indien aanwezig
      ansible.builtin.file:
        path: /etc/netdata/child.conf
        state: absent

    - name: Maak systemd override directory voor Netdata
      ansible.builtin.file:
        path: /etc/systemd/system/netdata.service.d
        state: directory
        mode: "0755"

    - name: Schrijf systemd override voor Netdata in LXC
      ansible.builtin.copy:
        dest: /etc/systemd/system/netdata.service.d/lxc-override.conf
        mode: "0644"
        content: |
          [Service]
          PrivateTmp=no
          PrivateDevices=no
          ProtectSystem=off
          ProtectHome=no
          ProtectControlGroups=no
          ProtectKernelModules=no
          ProtectKernelTunables=no
          PrivateUsers=no
          RestrictNamespaces=no
          ProtectProc=default
          ProcSubset=all

    - name: Herlaad systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Zorg dat Netdata enabled en gestart is
      ansible.builtin.service:
        name: netdata
        enabled: true
        state: restarted

    - name: Wacht tot Netdata actief is
      ansible.builtin.command: systemctl is-active netdata
      register: netdata_status
      changed_when: false
      retries: 10
      delay: 2
      until: netdata_status.stdout | trim == "active"

    - name: Toon provisioning samenvatting
      ansible.builtin.debug:
        msg: |
          Provisioning van {{ hostvars['localhost'].ct_hostname }} is voltooid.

          Node:
          {{ proxmox_node }}

          Bron-template:
          CT {{ ct_source_template_vmid }}

          Inloggen als gebruiker:
          {{ ct_username }}

          Uitgegeven IP-adres:
          {{ hostvars['localhost'].ct_ip_address }}

          Publieke SSH key van de aangemaakte user:
          {{ ct_ssh_public_key }}

          Lokale private key:
          {{ ct_ssh_key_path }}

          Lokale public key:
          {{ ct_ssh_key_path }}.pub

          SSH login-commando:
          ssh -i {{ ct_ssh_key_path }} {{ ct_username }}@{{ hostvars['localhost'].ct_ip_address }}
