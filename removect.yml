---
- name: Verwijder WordPress CT op Proxmox via API
  hosts: localhost
  gather_facts: false
  collections:
    - community.proxmox

  vars:
    local_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"

    proxmox_api_host: "10.24.43.3"
    proxmox_api_port: 8006
    proxmox_secret_file: "{{ local_home }}/secrets/proxmox_secret"

    proxmox_api_user: "{{ lookup('ansible.builtin.ini', 'api_user type=properties file=' + proxmox_secret_file) | trim }}"
    proxmox_api_token_id: "{{ lookup('ansible.builtin.ini', 'api_token_id type=properties file=' + proxmox_secret_file) | trim }}"
    proxmox_api_token_secret: "{{ lookup('ansible.builtin.ini', 'api_token_secret type=properties file=' + proxmox_secret_file) | trim }}"

    ct_ssh_key_dir: "{{ local_home }}/keys"
    root_known_hosts_file: "/root/.ssh/known_hosts"

  module_defaults:
    group/community.proxmox.proxmox:
      api_host: "{{ proxmox_api_host }}"
      api_port: "{{ proxmox_api_port }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id }}"
      api_token_secret: "{{ proxmox_api_token_secret }}"
      validate_certs: false

  pre_tasks:
    - name: Controleer Proxmox credentials uit secretbestand
      ansible.builtin.assert:
        that:
          - proxmox_api_user | length > 0
          - proxmox_api_token_id | length > 0
          - proxmox_api_token_secret | length > 0
        fail_msg: "Bestand ~/secrets/proxmox_secret mist api_user, api_token_id of api_token_secret"

    - name: Controleer dat klantnummer is opgegeven
      ansible.builtin.assert:
        that:
          - klantnummer is defined
          - klantnummer | string | length > 0
        fail_msg: "Geef een klantnummer op via -e klantnummer=123"

    - name: Stel hostname, VMID en keypaden vast
      ansible.builtin.set_fact:
        ct_hostname: "wordpress-{{ klantnummer }}"
        ct_vmid: "{{ klantnummer | int }}"
        ct_ssh_key_path: "{{ ct_ssh_key_dir }}/id_ed25519_{{ klantnummer }}"

    - name: Haal CT-info op via Proxmox API
      community.proxmox.proxmox_vm_info:
        type: lxc
        vmid: "{{ ct_vmid }}"
        config: current
      register: ct_info_result

    - name: Bepaal of de CT bestaat
      ansible.builtin.set_fact:
        ct_exists: "{{ (ct_info_result.proxmox_vms | default([]) | length) > 0 }}"

    - name: Zet gevonden CT-record vast
      ansible.builtin.set_fact:
        ct_info: "{{ ct_info_result.proxmox_vms[0] }}"
      when: ct_exists

    - name: Stel node, status en config vast
      ansible.builtin.set_fact:
        proxmox_node: "{{ ct_info.node }}"
        ct_current_status: "{{ ct_info.status | default('unknown') }}"
        ct_net0_line: "{{ ct_info.config.net0 | default('') }}"
      when: ct_exists

    - name: Extraheer IP-adres uit net0-config
      ansible.builtin.set_fact:
        ct_ip_address: "{{ ct_net0_line | regex_search('ip=([0-9.]+)/(\\d+)', '\\1') | first }}"
      when:
        - ct_exists
        - ct_net0_line | length > 0
        - ct_net0_line is search('ip=[0-9.]+/[0-9]+')

  tasks:
    - block:
        - name: Stop de CT geforceerd
          community.proxmox.proxmox:
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            state: stopped
            timeout: 300
          when: ct_exists
          no_log: true
          failed_when: false

        - name: Wacht tot CT echt gestopt is
          community.proxmox.proxmox_vm_info:
            type: lxc
            vmid: "{{ ct_vmid }}"
          register: ct_stop_check
          retries: 24
          delay: 5
          until: >
            (ct_stop_check.proxmox_vms | default([]) | length) == 0
            or
            ((ct_stop_check.proxmox_vms | first).status | default('stopped')) == 'stopped'
          failed_when: false
          when: ct_exists
          no_log: true

        - name: Verwijder de CT
          community.proxmox.proxmox:
            node: "{{ proxmox_node }}"
            vmid: "{{ ct_vmid }}"
            state: absent
            timeout: 300
          when: ct_exists
          no_log: true

        - name: Wacht tot CT uit cluster verdwenen is
          community.proxmox.proxmox_vm_info:
            type: lxc
            vmid: "{{ ct_vmid }}"
          register: ct_absent_check
          retries: 24
          delay: 5
          until: (ct_absent_check.proxmox_vms | default([]) | length) == 0
          failed_when: false
          when: ct_exists
          no_log: true

        - name: Controleer of /root/.ssh/known_hosts bestaat
          ansible.builtin.stat:
            path: "{{ root_known_hosts_file }}"
          register: root_known_hosts_stat

        - name: Verwijder CT-hostname uit /root/.ssh/known_hosts
          ansible.builtin.command:
            cmd: "ssh-keygen -R {{ ct_hostname }} -f {{ root_known_hosts_file }}"
          register: remove_known_host_hostname
          when: root_known_hosts_stat.stat.exists
          changed_when: >
            'not found' not in (remove_known_host_hostname.stderr | default('') | lower)
          failed_when: false

        - name: Verwijder CT-IP uit /root/.ssh/known_hosts
          ansible.builtin.command:
            cmd: "ssh-keygen -R {{ ct_ip_address }} -f {{ root_known_hosts_file }}"
          when:
            - root_known_hosts_stat.stat.exists
            - ct_ip_address is defined
          register: remove_known_host_ip
          changed_when: >
            'not found' not in (remove_known_host_ip.stderr | default('') | lower)
          failed_when: false

        - name: Verwijder lokale private key
          ansible.builtin.file:
            path: "{{ ct_ssh_key_path }}"
            state: absent

        - name: Verwijder lokale public key
          ansible.builtin.file:
            path: "{{ ct_ssh_key_path }}.pub"
            state: absent

        - name: Geef IP-adres terug aan ip_manager
          ansible.builtin.command: "./ip_manager.sh remove {{ ct_ip_address }}"
          args:
            chdir: "{{ playbook_dir }}"
          when: ct_ip_address is defined
          register: ip_remove_result
          changed_when: ip_remove_result.rc == 0

      rescue:
        - name: Controleer of /root/.ssh/known_hosts bestaat bij failure
          ansible.builtin.stat:
            path: "{{ root_known_hosts_file }}"
          register: root_known_hosts_stat_rescue
          failed_when: false

        - name: Verwijder CT-hostname uit /root/.ssh/known_hosts bij failure
          ansible.builtin.command:
            cmd: "ssh-keygen -R {{ ct_hostname }} -f {{ root_known_hosts_file }}"
          when: root_known_hosts_stat_rescue.stat.exists | default(false)
          failed_when: false
          changed_when: false

        - name: Verwijder CT-IP uit /root/.ssh/known_hosts bij failure
          ansible.builtin.command:
            cmd: "ssh-keygen -R {{ ct_ip_address }} -f {{ root_known_hosts_file }}"
          when:
            - root_known_hosts_stat_rescue.stat.exists | default(false)
            - ct_ip_address is defined
          failed_when: false
          changed_when: false

        - name: Verwijder lokale private key bij failure
          ansible.builtin.file:
            path: "{{ ct_ssh_key_path }}"
            state: absent
          failed_when: false

        - name: Verwijder lokale public key bij failure
          ansible.builtin.file:
            path: "{{ ct_ssh_key_path }}.pub"
            state: absent
          failed_when: false

        - name: Geef IP-adres alsnog terug aan ip_manager
          ansible.builtin.command: "./ip_manager.sh remove {{ ct_ip_address }}"
          args:
            chdir: "{{ playbook_dir }}"
          when: ct_ip_address is defined
          failed_when: false

        - name: Meld teardown failure
          ansible.builtin.fail:
            msg: >-
              Verwijderen van CT {{ ct_hostname }} is mislukt.
              Controleer handmatig of de CT, keys, known_hosts en het IP-adres zijn opgeruimd.

  post_tasks:
    - name: Toon gevonden node
      ansible.builtin.debug:
        msg: >-
          {% if ct_exists %}
          CT {{ ct_hostname }} (VMID {{ ct_vmid }}) stond op node {{ proxmox_node }} en is verwijderd.
          {% else %}
          CT {{ ct_hostname }} (VMID {{ ct_vmid }}) bestond niet meer.
          {% endif %}

    - name: Toon resultaat keys
      ansible.builtin.debug:
        msg: "Lokale keys verwijderd: {{ ct_ssh_key_path }} en {{ ct_ssh_key_path }}.pub"

    - name: Toon resultaat known_hosts cleanup
      ansible.builtin.debug:
        msg: >-
          SSH known_hosts opgeschoond voor {{ ct_hostname }}
          {% if ct_ip_address is defined %}en {{ ct_ip_address }}{% endif %}.

    - name: Toon resultaat IP-release
      ansible.builtin.debug:
        msg: >-
          {% if ct_ip_address is defined %}
          IP-adres {{ ct_ip_address }} is teruggegeven aan ip_manager.
          {% else %}
          Er is geen IP-adres uit de CT-config gehaald, dus er is niets teruggegeven aan ip_manager.
          {% endif %}
          {% endif %}
