---
- name: Maak WordPress CT op Proxmox
  hosts: localhost
  gather_facts: false
  collections:
    - community.proxmox

  vars:
    proxmox_api_host: "10.24.43.2"
    proxmox_api_port: 8006
    proxmox_node: "linda"
    proxmox_api_user: "root@pam"
    proxmox_api_password: "pindakaas"

    ct_rootfs_storage: "local-lvm"
    ct_template: "local:vztmpl/debian-12-turnkey-wordpress_18.2-1_amd64.tar.gz"

    ct_memory: 512
    ct_cores: 1
    ct_disk: "local-lvm:10"
    ct_bridge: "vmbr0"

  pre_tasks:
    - name: Controleer dat klantnummer is opgegeven
      ansible.builtin.assert:
        that:
          - klantnummer is defined
          - klantnummer | length > 0
        fail_msg: "Geef een klantnummer op via -e klantnummer=123"

    - name: Stel hostname en VMID vast
      ansible.builtin.set_fact:
        ct_hostname: "wordpress-{{ klantnummer }}"
        ct_vmid: "{{ klantnummer | int }}"

  tasks:
    - name: Maak de CT aan
      community.proxmox.proxmox:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        validate_certs: false

        node: "{{ proxmox_node }}"
        vmid: "{{ ct_vmid }}"
        state: present

        hostname: "{{ ct_hostname }}"
        ostemplate: "{{ ct_template }}"
        password: "{{ proxmox_api_password }}"

        cores: "{{ ct_cores }}"
        memory: "{{ ct_memory }}"
        disk: "{{ ct_disk }}"

        netif:
          net0: "name=eth0,bridge={{ ct_bridge }},ip=dhcp,firewall=1"

        onboot: true
        unprivileged: true

    - name: Voeg firewallregels toe aan de CT
      community.proxmox.proxmox_firewall:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        validate_certs: false

        node: "{{ proxmox_node }}"
        level: vm
        vmid: "{{ ct_vmid }}"
        state: present
        rules:
          - pos: 0
            type: in
            action: ACCEPT
            proto: tcp
            dport: "22"
            iface: net0
            enable: true
            comment: "Allow SSH"

          - pos: 1
            type: in
            action: ACCEPT
            proto: tcp
            dport: "80"
            iface: net0
            enable: true
            comment: "Allow HTTP"

          - pos: 2
            type: in
            action: ACCEPT
            proto: tcp
            dport: "443"
            iface: net0
            enable: true
            comment: "Allow HTTPS"

          - pos: 3
            type: in
            action: DROP
            iface: net0
            enable: true
            comment: "Drop all other ingress"

    - name: Start de CT
      community.proxmox.proxmox:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        validate_certs: false

        node: "{{ proxmox_node }}"
        vmid: "{{ ct_vmid }}"
        state: started
