---
- name: Maak WordPress CT op Proxmox
  hosts: localhost
  gather_facts: false
  collections:
    - community.proxmox
    - community.crypto

  vars:
    proxmox_api_host: "10.24.43.2"
    proxmox_api_port: 8006
    proxmox_node: "linda"
    proxmox_api_user: "root@pam"
    proxmox_api_password: "{{ lookup('ansible.builtin.file', 'pwd_secret') | trim }}"

    ct_rootfs_storage: "local-lvm"
    ct_template: "local:vztmpl/debian-12-turnkey-wordpress_18.2-1_amd64.tar.gz"

    ct_memory: 512
    ct_cores: 1
    ct_disk: "local-lvm:10"
    ct_bridge: "vmbr0"
    local_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"

  pre_tasks:
    - name: Controleer dat klantnummer is opgegeven
      ansible.builtin.assert:
        that:
          - klantnummer is defined
          - klantnummer | length > 0
        fail_msg: "Geef een klantnummer op via -e klantnummer=123"

    - name: Zorg dat ~/keys bestaat
      ansible.builtin.file:
        path: "{{ local_home }}/keys"
        state: directory
        mode: "0700"

    - name: Stel hostname, VMID, gebruikersnaam en keypad vast
      ansible.builtin.set_fact:
        ct_hostname: "wordpress-{{ klantnummer }}"
        ct_vmid: "{{ klantnummer | int }}"
        ct_username: "{{ klantnummer }}"
        ct_ssh_key_path: "{{ local_home }}/keys/id_ed25519_{{ klantnummer }}"

    - name: Genereer SSH keypair voor de klantgebruiker
      community.crypto.openssh_keypair:
        path: "{{ ct_ssh_key_path }}"
        type: ed25519
        comment: "{{ ct_username }}@{{ ct_hostname }}"
        mode: "0600"
      register: ct_ssh_keypair

    - name: Bewaar publieke SSH key
      ansible.builtin.set_fact:
        ct_ssh_public_key: "{{ ct_ssh_keypair.public_key }}"

  tasks:
    - name: Maak de CT aan
      community.proxmox.proxmox:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ ct_vmid }}"
        state: present
        hostname: "{{ ct_hostname }}"
        ostemplate: "{{ ct_template }}"
        password: "{{ proxmox_api_password }}"
        cores: "{{ ct_cores }}"
        memory: "{{ ct_memory }}"
        disk: "{{ ct_disk }}"
        netif:
          net0: "name=eth0,bridge={{ ct_bridge }},ip=dhcp,firewall=1"
        onboot: true
        unprivileged: true
      no_log: true

    - name: Voeg firewallregels toe aan de CT
      community.proxmox.proxmox_firewall:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        level: vm
        vmid: "{{ ct_vmid }}"
        state: present
        rules:
          - pos: 0
            type: in
            action: ACCEPT
            proto: tcp
            dport: "22"
            iface: net0
            enable: true
            comment: "Allow SSH"
          - pos: 1
            type: in
            action: ACCEPT
            proto: tcp
            dport: "80"
            iface: net0
            enable: true
            comment: "Allow HTTP"
          - pos: 2
            type: in
            action: ACCEPT
            proto: tcp
            dport: "443"
            iface: net0
            enable: true
            comment: "Allow HTTPS"
          - pos: 3
            type: in
            action: DROP
            iface: net0
            enable: true
            comment: "Drop all other ingress"
      no_log: true

    - name: Start de CT
      community.proxmox.proxmox:
        api_host: "{{ proxmox_api_host }}"
        api_port: "{{ proxmox_api_port }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ ct_vmid }}"
        state: started
      no_log: true

    - name: Wacht kort zodat de CT volledig is opgestart
      ansible.builtin.pause:
        seconds: 8

    - name: Maak gebruiker aan in de CT
      ansible.builtin.shell: >
        ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }}
        "pct exec {{ ct_vmid }} -- sh -lc 'id -u {{ ct_username }} >/dev/null 2>&1 || useradd -m -s /bin/bash {{ ct_username }}'"
      args:
        executable: /bin/bash
      no_log: true

    - name: Maak .ssh directory aan in de CT
      ansible.builtin.shell: >
        ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }}
        "pct exec {{ ct_vmid }} -- sh -lc 'mkdir -p /home/{{ ct_username }}/.ssh &&
        chmod 700 /home/{{ ct_username }}/.ssh &&
        chown {{ ct_username }}:{{ ct_username }} /home/{{ ct_username }}/.ssh'"
      args:
        executable: /bin/bash
      no_log: true

    - name: Zet public key in authorized_keys in de CT
      ansible.builtin.shell: |
        ssh -o StrictHostKeyChecking=no root@{{ proxmox_api_host }} \
        "pct exec {{ ct_vmid }} -- sh -lc 'cat > /home/{{ ct_username }}/.ssh/authorized_keys <<\"EOF\"
        {{ ct_ssh_public_key }}
        EOF
        chmod 600 /home/{{ ct_username }}/.ssh/authorized_keys
        chown {{ ct_username }}:{{ ct_username }} /home/{{ ct_username }}/.ssh/authorized_keys'"
      args:
        executable: /bin/bash
      no_log: true

    - name: Toon de publieke SSH key
      ansible.builtin.debug:
        msg: "{{ ct_ssh_public_key }}"
